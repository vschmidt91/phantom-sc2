[project]
name = "phantom-sc2"
version = "3.0.0"
dependencies = [
    "numpy >= 1.25.0",
    "scipy >= 1.11.1",
    "scikit-image >= 0.18.0",
    "s2clientprotocol~=5.0.7.84643.0",
    "loguru~=0.6.0",
    "aiohttp~=3.7.4.post0",
    "tqdm~=4.62.3",
    "burnysc2 @ git+https://github.com/BurnySc2/python-sc2#develop",
    "scikit-learn>=1.2.2",
    "matplotlib>=3.7.1",
]

[project.optional-dependencies]
dev = [
    "types-s2clientprotocol",
    "mypy",
    "flake8",
    "black",
    "pyproject-flake8",
    "isort",
    "snakeviz",
]

[[tool.mypy.overrides]]
module = [
    "matplotlib.*",
    "sc2.*",
    "scipy.*",
    "skimage.*",
]
ignore_missing_imports = true

[tool.flake8]
max-line-length = 120
extend-ignore = ["E203"]
max-complexity = 10